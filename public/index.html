<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de LED - ESP32</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-container">
      <div class="header-left">
        <h1 class="title"><span class="title-icon">🔴</span> Control de LED - ESP32</h1>
        <p class="subtitle">Conectado vía WiFi al dispositivo simulado en Wokwi</p>
      </div>
      <div class="header-right">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot offline"></span>
          <span class="status-text">Conectando...</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main-container">
    <div class="container">

      <section class="led-section">
        <h2 class="section-title">💡 LED</h2>
        <div class="led-container">
          <div class="led-control">
            <button class="led-button red" id="ledButton" title="Click para toggle"></button>
            <label class="led-label">LED Principal</label>
            <input
              type="range"
              class="brightness-slider"
              id="brightnessSlider"
              min="0"
              max="255"
              value="0"
              title="Arrastra para ajustar brillo"
            >
            <span class="brightness-value" id="brightnessValue">0%</span>
          </div>
        </div>
      </section>

      <section class="controls-section">
        <h2 class="section-title">🎛️ Controles</h2>
        <div class="controls-grid">
          <div class="control-card">
            <h3 class="control-title">Control Rápido</h3>
            <div class="button-group">
              <button class="btn btn-success btn-large" id="btnOn">Encender</button>
              <button class="btn btn-danger btn-large" id="btnOff">Apagar</button>
            </div>
          </div>
        </div>
      </section>

      <section class="status-section">
        <h2 class="section-title">📊 Estado Actual</h2>
        <div class="status-card">
          <div class="status-led-name">
            <span class="status-led-emoji">🔴</span>
            <span>LED Principal</span>
          </div>
          <div class="status-values">
            <div>
              <span class="status-value-label">Estado:</span>
              <span class="status-value" id="statusStateValue">🔴 OFF</span>
            </div>
            <div>
              <span class="status-value-label">Brillo:</span>
              <span class="status-value" id="statusBrightnessValue">0%</span>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader">
      <div class="spinner"></div>
      <p>Enviando comando...</p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
