<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Control de 5 LEDs - Interfaz Web Premium">
  <meta name="theme-color" content="#667eea">
  <title>💡 Control de LEDs - Dashboard Premium</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💡</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <div class="header-left">
        <h1 class="title">
          <span class="title-icon">💡</span>
          Control de LEDs
        </h1>
        <p class="subtitle">Dashboard Premium - Interfaz Web</p>
      </div>
      <div class="header-right">
        <div class="status-indicator active" id="statusIndicator">
          <span class="status-dot"></span>
          <span class="status-text">En línea</span>
        </div>
        <div class="connection-info" id="connectionInfo">
          <span class="label">Servidor:</span>
          <span class="value">Conectado ✓</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="main-container">
    <div class="container">
      
      <!-- LEDs Grid -->
      <section class="leds-section">
        <h2 class="section-title">⚡ LEDs Controlables</h2>
        <div class="leds-grid" id="ledsGrid"></div>
      </section>

      <!-- Controls Section -->
      <section class="controls-section">
        <div class="controls-grid">
          
          <!-- Control General -->
          <div class="control-card">
            <h3 class="control-title">🎛️ Control General</h3>
            <div class="button-group">
              <button class="btn btn-success btn-large" onclick="toggleAllLeds('on')">
                <span class="btn-icon">✓</span>
                Todos ON
              </button>
              <button class="btn btn-danger btn-large" onclick="toggleAllLeds('off')">
                <span class="btn-icon">✗</span>
                Todos OFF
              </button>
            </div>
          </div>

          <!-- Secuencias -->
          <div class="control-card">
            <h3 class="control-title">🎬 Secuencias</h3>
            <div class="sequences-grid">
              <button class="btn btn-sequence" onclick="playSequence('pulse)">
                <span class="seq-icon">🔴</span>
                <span class="seq-name">Pulse</span>
                <span class="seq-desc">Parpadeo</span>
              </button>
              <button class="btn btn-sequence" onclick="playSequence('wave')">
                <span class="seq-icon">〰️</span>
                <span class="seq-name">Wave</span>
                <span class="seq-desc">Onda</span>
              </button>
              <button class="btn btn-sequence" onclick="playSequence('rainbow')">
                <span class="seq-icon">🌈</span>
                <span class="seq-name">Rainbow</span>
                <span class="seq-desc">Arco iris</span>
              </button>
            </div>
          </div>

          <!-- Modo Automático -->
          <div class="control-card">
            <h3 class="control-title">⚙️ Modo Automático</h3>
            <div class="auto-mode-container">
              <div class="toggle-switch" id="autoModeToggle" onclick="toggleAutoMode()">
                <div class="toggle-slider"></div>
              </div>
              <span class="toggle-label" id="autoModeLabel">Desactivado</span>
              <p class="toggle-desc">Ejecuta secuencias automáticamente</p>
            </div>
          </div>

        </div>
      </section>

      <!-- Status Section -->
      <section class="status-section">
        <h2 class="section-title">📊 Estado en Tiempo Real</h2>
        <div class="status-grid" id="statusGrid"></div>
      </section>

    </div>
  </main>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader">
      <div class="spinner"></div>
      <p>Cargando...</p>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
